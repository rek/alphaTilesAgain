name: Deploy Apps to GitHub Pages

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      NX_NO_CLOUD: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      # This enables task distribution via Nx Cloud
      # Run this command as early as possible, before dependencies are installed
      # Learn more at https://nx.dev/ci/reference/nx-cloud-cli#npx-nxcloud-startcirun
      # Connect your workspace by running "nx connect" and uncomment this
      - run: npx nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="build"
      - uses: actions/setup-node@v4
        with:
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - run: npm ci
      - uses: nrwl/nx-set-shas@v4

      # ─── Build all apps ──────────────────────────────────────────────
      - name: Build
        run: npx nx affected -t web-export
        env:
          EXPO_BASE_URL: /en

      # ─── Assemble into one dir ───────────────────────────────────────
      - name: Assemble site
        run: |
          mkdir -p dist/site
          cp -r dist/apps/hub/. dist/site/
          for app in en; do
            mkdir -p "dist/site/$app"
            cp -r "dist/web/$app/." "dist/site/$app/"
            echo "/*  /index.html  200" > "dist/site/$app/_redirects"
          done
