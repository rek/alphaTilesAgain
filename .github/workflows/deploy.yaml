name: Deploy to GitHub Pages

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      NX_NO_CLOUD: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - uses: nrwl/nx-set-shas@v4

      - name: Restore NX cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-

      # ─── Build landing page (always) ─────────────────────────────────
      - name: Build home
        run: npx nx build home

      # ─── Build each language (sequential — each overwrites dist/web/alpha-tiles) ───
      - name: Build eng
        run: |
          npx tsx tools/generate-lang-manifest.ts
          npx nx run alphaTiles:web-export
        env:
          APP_LANG: eng
          EXPO_BASE_URL: /alphaTilesAgain/engEnglish4

      - name: Stage eng output
        run: |
          mkdir -p dist/site/engEnglish4
          cp -r dist/web/alpha-tiles/. dist/site/engEnglish4/
          echo "/*  /index.html  200" > dist/site/engEnglish4/_redirects

      - name: Build yue
        run: |
          npx tsx tools/generate-lang-manifest.ts
          npx nx run alphaTiles:web-export --skip-nx-cache
        env:
          APP_LANG: yue
          EXPO_BASE_URL: /alphaTilesAgain/yueCantonese

      - name: Stage yue output
        run: |
          mkdir -p dist/site/yueCantonese
          cp -r dist/web/alpha-tiles/. dist/site/yueCantonese/
          echo "/*  /index.html  200" > dist/site/yueCantonese/_redirects

      # ─── Assemble landing page ────────────────────────────────────────
      - name: Assemble site
        run: |
          mkdir -p dist/site
          cp -r dist/apps/home/. dist/site/

      # ─── Deploy ──────────────────────────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
